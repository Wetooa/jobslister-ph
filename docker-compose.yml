services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 60s
    restart: unless-stopped

  # One-shot: pulls the model into the ollama volume (idempotent on later runs).
  ollama-pull:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    command: ["pull", "gemma4:31b-cloud"]
    restart: "no"

  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      # Overrides .env so the app targets the compose network, not the host.
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: gemma4:31b-cloud
    volumes:
      - ./data:/app/data
    depends_on:
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  ollama_data:
